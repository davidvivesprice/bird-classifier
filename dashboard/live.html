<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bird Cam Live</title>
<meta name="theme-color" content="#000">
<!--
  Delayed-playback live viewer with pre-computed detection overlays.

  Architecture (v2, April 16, 2026 — drift-proof via sidecar manifest):
  - Video: hls.js plays pipeline-generated HLS segments ~10s behind live edge
    (liveSyncDuration=8, actual delay ~10-12s due to 5s segment boundaries)
  - Timestamps: pipeline/hls_recorder.py writes segments.json with iMac
    wall-clock at segment-completion time. Browser fetches the manifest and
    computes the displayed frame's ingest time from that + fragment duration.
    This REPLACES hls.playingDate, which is anchored to ffmpeg start time
    (not to frame arrival) and cannot be drift-proof — see Gate 2 in
    docs/superpowers/specs/2026-04-16-overlay-sync-ground-truth-verification.md
  - Detections: Pipeline SSE events carry wall_time_ms, stamped via the same
    clock (Python time.time() on iMac) at the same pipeline stage as the
    sidecar — so overlay and video reference the same moment. No compensation.
  - Overlay: requestVideoFrameCallback fires per displayed frame.
-->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }

  .live-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* Controls bar — bottom of the video */
  .controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    z-index: 10;
    pointer-events: auto;
  }
  .controls button {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.8);
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 5px 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .controls button:hover { background: rgba(255,255,255,0.15); }
  .controls button.active { background: rgba(74,222,128,0.4); border-color: #4ade80; color: #fff; }
  .controls .spacer { flex: 1; }
  .controls .status {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
    font-variant-numeric: tabular-nums;
  }

  /* Offline indicator */
  .offline {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 0.85rem;
    z-index: 5;
  }
  .offline .icon { font-size: 2rem; display: block; margin-bottom: 8px; }

  /* Debug overlay (toggle with D key) */
  .debug {
    position: absolute;
    top: 8px; left: 8px;
    z-index: 20;
    background: rgba(0,0,0,0.8);
    color: #e8eaed;
    font-family: monospace;
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 8px;
    line-height: 1.7;
    pointer-events: none;
    display: none;
    min-width: 260px;
  }
</style>
</head>
<body>
<div class="live-wrap" id="live-wrap">
  <video id="video" muted playsinline></video>
  <canvas id="overlay"></canvas>

  <div class="controls">
    <button class="active" id="btn-labels" onclick="toggleLabels()">Labels</button>
    <button id="btn-fullscreen" onclick="toggleFullscreen()">&#x26F6;</button>
    <span class="spacer"></span>
    <span class="status" id="delay-status"></span>
  </div>

  <div class="offline" id="offline">
    <span class="icon">&#x1F4F7;</span>
    <div>Connecting to camera...</div>
  </div>

  <div class="debug" id="debug"></div>
</div>

<script>
(function() {
  'use strict';

  // ── Configuration ──

  var DELAY_SECONDS = 8;  // target seconds behind live edge
  var STALE_MS = 1200;    // time without events before fade-out starts (wider than live because 5s segments)
  var FADE_IN_MS = 200;
  var FADE_OUT_MS = 400;
  var LABEL_FONT = '14px system-ui, -apple-system, sans-serif';
  var LABEL_HEIGHT = 24;
  var LABEL_PAD_X = 8;
  var LABEL_W_ESTIMATE = 140;
  var EVENT_BUFFER_AGE_MS = 120000;  // keep 2 minutes of SSE event history
  var EVENT_MATCH_TOLERANCE_MS = 3000; // match events within 3s of frame-wallclock
  var MANIFEST_URL = '/api/hls-live/feeder/segments.json';
  var MANIFEST_REFRESH_MS = 2000; // refetch manifest this often

  // ── Elements ──

  var video = document.getElementById('video');
  var canvas = document.getElementById('overlay');
  var ctx = canvas.getContext('2d');
  var offlineEl = document.getElementById('offline');
  var debugEl = document.getElementById('debug');
  var delayStatusEl = document.getElementById('delay-status');

  // ── State ──

  var showLabels = true;
  var debugVisible = false;
  var hls = null;
  var trackStates = new Map();
  var eventBuffer = [];  // SSE events sorted by wall_time_ms
  var sseConnected = false;
  // Sidecar manifest: { "seg_...ts": completed_ms, ... }
  var segmentWallclock = Object.create(null);
  var manifestLastUpdateMs = 0;

  // ── hls.js Setup ──
  // Per hls.js API.md (https://github.com/video-dev/hls.js/blob/master/docs/API.md):
  // liveSyncDuration: target playback position behind live edge
  // liveMaxLatencyDuration: max drift before seeking forward
  // maxLiveSyncPlaybackRate: gentle speed-up for drift correction

  if (!Hls.isSupported()) {
    offlineEl.innerHTML = '<span class="icon">&#x26A0;</span><div>HLS not supported in this browser</div>';
    return;
  }

  hls = new Hls({
    liveSyncDuration: DELAY_SECONDS,
    liveMaxLatencyDuration: DELAY_SECONDS + 10,
    maxBufferLength: DELAY_SECONDS + 15,
    backBufferLength: 10,
    maxLiveSyncPlaybackRate: 1.1,
    enableWorker: true,
    lowLatencyMode: false,
    debug: false,
  });

  hls.loadSource('/api/hls-live/feeder/live.m3u8');
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_PARSED, function() {
    video.play().catch(function() {
      video.muted = true;
      video.play().catch(function() {});
    });
  });

  hls.on(Hls.Events.ERROR, function(event, data) {
    if (data.fatal) {
      console.error('[HLS] Fatal error:', data.type, data.details);
      if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
        hls.recoverMediaError();
      }
    }
  });

  // Hide offline once video plays
  video.addEventListener('playing', function() {
    offlineEl.style.display = 'none';
  });

  // ── Sidecar manifest loader ──
  // Replaces hls.playingDate (which is anchored to ffmpeg start time, not
  // frame arrival) as the source of truth for "when was this frame captured."
  // Python's HLS recorder writes segments.json with iMac wall-clock time for
  // each .ts segment's completion. Combined with fragment duration from
  // hls.js, we derive the wall-clock of any displayed frame.
  function refreshManifest() {
    fetch(MANIFEST_URL, { cache: 'no-store' })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data || !Array.isArray(data.segments)) return;
        var next = Object.create(null);
        for (var i = 0; i < data.segments.length; i++) {
          var s = data.segments[i];
          if (s && s.file && typeof s.completed_ms === 'number') {
            next[s.file] = s.completed_ms;
          }
        }
        segmentWallclock = next;
        manifestLastUpdateMs = data.updated_ms || Date.now();
      })
      .catch(function() { /* transient */ });
  }
  refreshManifest();
  setInterval(refreshManifest, MANIFEST_REFRESH_MS);

  // Given the video's currentTime, find the hls.js fragment that contains
  // it and return { filename, fragStart, fragDuration } — or null.
  function currentFragment() {
    if (!hls || !hls.levels || !hls.levels[0] || !hls.levels[0].details) return null;
    var frags = hls.levels[0].details.fragments;
    if (!frags || frags.length === 0) return null;
    var ct = video.currentTime;
    for (var i = 0; i < frags.length; i++) {
      var f = frags[i];
      if (ct >= f.start && ct < f.start + f.duration) {
        // f.relurl may include query string or path; extract bare filename
        var url = f.relurl || f.url || '';
        var fname = url.split('?')[0].split('/').pop();
        return { filename: fname, fragStart: f.start, fragDuration: f.duration };
      }
    }
    return null;
  }

  // Core: map the currently displayed frame to its iMac wall-clock at ingest.
  // Returns null until the sidecar has a record for the segment in question
  // (e.g., for a few seconds after page load, or during a manifest refresh gap).
  function displayedFrameWallMs() {
    var frag = currentFragment();
    if (!frag) return null;
    var completedMs = segmentWallclock[frag.filename];
    if (typeof completedMs !== 'number') return null;
    // completed_ms = when the last frame of the segment landed on disk.
    // first_frame_ms ≈ completed_ms − (segment duration in seconds × 1000)
    // displayed_ms = first_frame_ms + (video.currentTime − frag.start) × 1000
    var firstFrameMs = completedMs - (frag.fragDuration * 1000);
    var offsetMs = (video.currentTime - frag.fragStart) * 1000;
    return firstFrameMs + offsetMs;
  }

  // ── SSE Event Buffer ──
  // Pipeline SSE events arrive in real-time with wall_time_ms.
  // We buffer them and match to hls.playingDate for overlay sync.

  var es = new EventSource('/api/pipeline/events/sse?camera=feeder');

  es.addEventListener('message', function(ev) {
    var data;
    try { data = JSON.parse(ev.data); } catch(e) { return; }
    if (!data.tracks || data.wall_time_ms == null) return;
    if (!sseConnected) { sseConnected = true; }
    eventBuffer.push(data);
    // Prune events older than buffer window
    var cutoff = Date.now() - EVENT_BUFFER_AGE_MS;
    while (eventBuffer.length > 0 && eventBuffer[0].wall_time_ms < cutoff) {
      eventBuffer.shift();
    }
  });

  // Find the best-matching event for a given wall-clock timestamp.
  // Returns the event with the closest wall_time_ms, or null if none within tolerance.
  function findEvent(targetMs) {
    if (eventBuffer.length === 0) return null;
    var best = null, bestDist = Infinity;
    // Search backwards from newest (most likely to match recent playback)
    for (var i = eventBuffer.length - 1; i >= 0; i--) {
      var dist = Math.abs(eventBuffer[i].wall_time_ms - targetMs);
      if (dist < bestDist) { best = eventBuffer[i]; bestDist = dist; }
      // Stop searching once we're past the target by more than tolerance
      if (eventBuffer[i].wall_time_ms < targetMs - EVENT_MATCH_TOLERANCE_MS) break;
    }
    return bestDist <= EVENT_MATCH_TOLERANCE_MS ? best : null;
  }

  // Apply a matched event to track states for rendering.
  // This updates the trackStates Map with current bbox positions, species, etc.
  function applyEvent(data) {
    if (!data.tracks) return;
    var wall = data.wall_time_ms;
    var seen = {};
    for (var i = 0; i < data.tracks.length; i++) {
      var t = data.tracks[i];
      seen[t.track_id] = true;
      var state = trackStates.get(t.track_id);
      if (!state) {
        state = { first_seen_t: wall, prev_t: wall, prev_x: t.bbox_center_x };
        trackStates.set(t.track_id, state);
      }
      state.prev_t = state.last_t != null ? state.last_t : wall;
      state.prev_x = state.last_x != null ? state.last_x : t.bbox_center_x;
      state.last_t = wall;
      state.last_x = t.bbox_center_x;
      state.species = t.species;
      state.bbox = t.bbox;
      state.bbox_area = (t.bbox[2] - t.bbox[0]) * (t.bbox[3] - t.bbox[1]);
      state.bbox_top = t.bbox[1];
      state.frame_width = t.frame_width;
      state.frame_height = t.frame_height;
      state.track_id = t.track_id;
      state.species_confidence = t.species_confidence;
      state.model_source = t.model_source;
      state.is_locked = t.is_locked;
      state.frame_count = t.frame_count;
      state.fadeOutAt = null;
    }
    // Mark unseen tracks for fade-out
    trackStates.forEach(function(state, id) {
      if (!seen[id] && !state.fadeOutAt) state.fadeOutAt = wall;
    });
  }

  // ── Drawing Functions ──
  // Ported from the working v3 overlay renderer in dashboard/index.html

  function drawDot(x, y, opacity) {
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawLabel(x, y, text, opacity) {
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.font = LABEL_FONT;
    var w = ctx.measureText(text).width + 2 * LABEL_PAD_X;
    var h = LABEL_HEIGHT;
    var rx = x - w / 2;
    var ry = y - h / 2;
    var radius = 12;

    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 2;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.beginPath();
    ctx.moveTo(rx + radius, ry);
    ctx.lineTo(rx + w - radius, ry);
    ctx.quadraticCurveTo(rx + w, ry, rx + w, ry + radius);
    ctx.lineTo(rx + w, ry + h - radius);
    ctx.quadraticCurveTo(rx + w, ry + h, rx + w - radius, ry + h);
    ctx.lineTo(rx + radius, ry + h);
    ctx.quadraticCurveTo(rx, ry + h, rx, ry + h - radius);
    ctx.lineTo(rx, ry + radius);
    ctx.quadraticCurveTo(rx, ry, rx + radius, ry);
    ctx.closePath();
    ctx.fill();

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  // ── Adaptive Lock smoothing ──
  // Designed in the motion sandbox with David and his father, April 18 2026.
  // Two Gaussian kernels (wide and narrow) blended by the bird's instantaneous
  // speed. Wide dominates when still (kills YOLO jitter); narrow dominates in
  // motion (tracks responsively).
  //
  // SYMMETRIC kernels (events from before AND after displayedWallMs) because
  // /live.html plays video ~10s behind wall clock and renders against
  // displayedWallMs from the sidecar — the buffer is full of future events
  // relative to the displayed frame. This is the core reason the sandbox
  // experience ports cleanly here: we port the CLOCK (video time) not just
  // the math. See memory: feedback_port_the_clock_not_just_the_math.md.

  var SIGMA_WIDE_MS   = 450;
  var SIGMA_NARROW_MS = 220;
  var VEL_LO_PX_S     = 20;
  var VEL_HI_PX_S     = 80;
  var VEL_LOOKBACK_MS = 150;
  var ALPHA_EMA_GAIN  = 0.1;
  // α-EMA state persists across frames, keyed by track_id. indexTracksFromBuffer
  // rebuilds series each frame, so we can't store it on series. Map entries are
  // pruned by pruneAlphaState below.
  var _adaptiveAlphaEMA = new Map();

  // Symmetric Gaussian kernel over a track's events at time T. Returns the
  // weighted-average anchor {cx, top} in substream coords. halfWindow = 3.2σ
  // keeps truncation error under 0.3%.
  function gaussianAt(events, T, sigma_ms) {
    var sigma2 = sigma_ms * sigma_ms;
    var halfWindow = sigma_ms * 3.2;
    var sx = 0, sy = 0, sw = 0;
    for (var i = 0; i < events.length; i++) {
      var d = events[i].wall - T;
      if (d > halfWindow) break;     // events chronological; rest is future beyond window
      if (d < -halfWindow) continue; // too far in past
      var w = Math.exp(-(d * d) / (2 * sigma2));
      var b = events[i].bbox;
      sx += ((b[0] + b[2]) / 2) * w;
      sy += b[1] * w;
      sw += w;
    }
    if (sw === 0) return null;
    return { cx: sx / sw, top: sy / sw };
  }

  // Adaptive Lock: blend Precision Lock (σ_wide) with Weighted Average (σ_narrow)
  // based on the bird's current speed. Temporally smoothed blend weight avoids
  // regime flicker at the transition band.
  function adaptiveAnchorAt(trackId, series, T) {
    var events = series.events;
    if (!events.length) return null;
    var narrow = gaussianAt(events, T, SIGMA_NARROW_MS);
    if (!narrow) {
      // No events within the ±σ_narrow window of T. Fall back to the
      // event CHRONOLOGICALLY CLOSEST to T — NOT the newest event.
      // On /live the video plays ~10 s behind wall-clock, so
      // events[events.length-1] is the bird's FUTURE position (where
      // it will be 10 s from now), not where it is on the displayed
      // frame. The chronologically-closest event gives the best
      // approximation of "where the bird actually is right now in
      // what's on screen."
      var closest = events[0];
      var bestDt = Math.abs(events[0].wall - T);
      for (var k = 1; k < events.length; k++) {
        var dt = Math.abs(events[k].wall - T);
        if (dt < bestDt) { bestDt = dt; closest = events[k]; }
      }
      var b = closest.bbox;
      return { cx: (b[0] + b[2]) / 2, top: b[1] };
    }
    var wide = gaussianAt(events, T, SIGMA_WIDE_MS) || narrow;

    var past = gaussianAt(events, T - VEL_LOOKBACK_MS, SIGMA_NARROW_MS);
    var vel_px_s = 0;
    if (past) {
      var dx = narrow.cx - past.cx;
      var dy = narrow.top - past.top;
      vel_px_s = Math.sqrt(dx * dx + dy * dy) / (VEL_LOOKBACK_MS / 1000);
    }
    var alphaRaw = (vel_px_s - VEL_LO_PX_S) / (VEL_HI_PX_S - VEL_LO_PX_S);
    if (alphaRaw < 0) alphaRaw = 0;
    if (alphaRaw > 1) alphaRaw = 1;

    var prev = _adaptiveAlphaEMA.get(trackId);
    var alpha = (prev == null) ? alphaRaw : prev + (alphaRaw - prev) * ALPHA_EMA_GAIN;
    _adaptiveAlphaEMA.set(trackId, alpha);

    return {
      cx:  (1 - alpha) * wide.cx  + alpha * narrow.cx,
      top: (1 - alpha) * wide.top + alpha * narrow.top,
    };
  }

  // Keep the α-EMA map bounded — drop entries for track_ids no longer present
  // in the live trackSeries. Call once per frame after indexTracksFromBuffer.
  function pruneAlphaState(liveTracks) {
    if (_adaptiveAlphaEMA.size < 64) return;  // cheap guard — rarely grows
    _adaptiveAlphaEMA.forEach(function(_, id) {
      if (!liveTracks.has(id)) _adaptiveAlphaEMA.delete(id);
    });
  }

  // Walk eventBuffer once per frame, group events by track_id chronologically.
  // Tracks ending before STALE_MS + FADE_OUT_MS ago are still kept so fade-out
  // can complete visually; renderFrame filters them.
  function indexTracksFromBuffer() {
    var tracks = new Map();
    for (var i = 0; i < eventBuffer.length; i++) {
      var ev = eventBuffer[i];
      if (!ev.tracks) continue;
      for (var j = 0; j < ev.tracks.length; j++) {
        var t = ev.tracks[j];
        var series = tracks.get(t.track_id);
        if (!series) {
          series = { events: [], firstSeen: ev.wall_time_ms };
          tracks.set(t.track_id, series);
        }
        series.events.push({ wall: ev.wall_time_ms, bbox: t.bbox });
        series.lastSeen = ev.wall_time_ms;
        if (t.species) series.latestSpecies = t.species;
        series.latestFrameW = t.frame_width || 640;
        series.latestFrameH = t.frame_height || 360;
        series.latestLocked = !!t.is_locked;
        series.latestConfidence = t.species_confidence;
      }
    }
    return tracks;
  }

  // ── Frame Renderer ──
  // Uses requestVideoFrameCallback for frame-accurate sync.
  // Reads displayed wall-clock from sidecar manifest (no drift).
  // Labels-only overlay: Adaptive Lock smoothing feeds a single pill per track.

  var lastMatchedWall = 0;
  var lastRenderTrackCount = 0;

  function renderFrame(now, metadata) {
    // Resize canvas to match video display size
    var rect = video.getBoundingClientRect();
    var w = Math.floor(rect.width);
    var h = Math.floor(rect.height);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!showLabels || !hls) {
      video.requestVideoFrameCallback(renderFrame);
      return;
    }

    // Get the wall-clock time of the currently displayed frame via the
    // sidecar manifest. Same clock (Python time.time() on iMac) used by the
    // pipeline to stamp SSE event wall_time_ms → no drift, no compensation.
    var displayedWallMs = displayedFrameWallMs();

    if (displayedWallMs == null) {
      // Sidecar not ready yet (just loaded, or fragment not yet in manifest).
      // Skip this frame rather than draw with a guess.
      video.requestVideoFrameCallback(renderFrame);
      return;
    }

    // Update delay status display
    var delayS = ((Date.now() - displayedWallMs) / 1000).toFixed(0);
    delayStatusEl.textContent = delayS + 's delay';

    // Debug introspection (same clock as before, new track-count semantics).
    window.__lastSyncState = {
      now: Date.now(),
      displayedWallMs: displayedWallMs,
      delayFromNowMs: Date.now() - displayedWallMs,
      eventBufferLen: eventBuffer.length,
      lastRenderTrackCount: lastRenderTrackCount,
      newestEvent: eventBuffer.length > 0 ? {
        wall_time_ms: eventBuffer[eventBuffer.length - 1].wall_time_ms,
        age_behind_now_ms: Date.now() - eventBuffer[eventBuffer.length - 1].wall_time_ms,
        age_behind_frame_ms: eventBuffer[eventBuffer.length - 1].wall_time_ms - displayedWallMs,
      } : null,
    };

    // Letterbox-aware video content rectangle inside the canvas.
    var vw = video.videoWidth || 1920;
    var vh = video.videoHeight || 1080;
    var videoAspect = vw / vh;
    var containerAspect = canvas.width / canvas.height;
    var contentW, contentH, offX, offY;
    if (containerAspect > videoAspect) {
      contentH = canvas.height;
      contentW = canvas.height * videoAspect;
      offY = 0;
      offX = (canvas.width - contentW) / 2;
    } else {
      contentW = canvas.width;
      contentH = canvas.width / videoAspect;
      offX = 0;
      offY = (canvas.height - contentH) / 2;
    }

    // Walk the SSE buffer once, group by track.
    var trackSeries = indexTracksFromBuffer();
    pruneAlphaState(trackSeries);

    var placements = [];
    trackSeries.forEach(function(series, trackId) {
      // Track not yet visible (first event is still in the future): skip.
      if (series.firstSeen - displayedWallMs > FADE_IN_MS) return;
      // Track expired beyond fade-out window: skip.
      var ageAfterLast = displayedWallMs - series.lastSeen;
      if (ageAfterLast > (STALE_MS + FADE_OUT_MS)) return;

      // Adaptive Lock anchor — {cx, top} in substream coords. Only the
      // two scalars we need for label placement; no bbox dimensions.
      var sm = adaptiveAnchorAt(trackId, series, displayedWallMs);
      if (!sm) return;

      var fw = series.latestFrameW || 640;
      var fh = series.latestFrameH || 360;

      // Scale smoothed anchor to the video content rect (not raw canvas).
      var sx = contentW / fw, sy = contentH / fh;
      var centerX = offX + sm.cx * sx;
      var topY    = offY + sm.top * sy;

      // Opacity: fade in from first event, fade out after STALE_MS past last event.
      var opacity = 1;
      if (ageAfterLast > STALE_MS) {
        opacity = Math.max(0, 1 - (ageAfterLast - STALE_MS) / FADE_OUT_MS);
      } else {
        var sinceFirst = displayedWallMs - series.firstSeen;
        if (sinceFirst < FADE_IN_MS) {
          opacity = Math.max(0, Math.min(1, sinceFirst / FADE_IN_MS));
        }
      }

      placements.push({
        trackId: trackId,
        cx: centerX,
        labelY: Math.max(22, topY - 36),  // generous pill-height gap above bird head
        opacity: opacity,
        species: series.latestSpecies,
        confidence: series.latestConfidence,
        isLocked: series.latestLocked,
        // Proxy for size-ordering in the collision pass — larger tracks
        // (more events, or more recent) win the top slot.
        area: series.events.length,
      });
    });
    lastRenderTrackCount = placements.length;

    // Collision-avoid labels: larger tracks get first pick.
    placements.sort(function(a, b) { return b.area - a.area; });
    var placed = [];
    for (var i = 0; i < placements.length; i++) {
      var p = placements[i];
      var y = p.labelY;
      for (var j = 0; j < placed.length; j++) {
        if (Math.abs(placed[j].cx - p.cx) < LABEL_W_ESTIMATE && Math.abs(placed[j].labelY - y) < LABEL_HEIGHT + 8) {
          y += LABEL_HEIGHT + 8;
          j = -1;
        }
      }
      p.labelY = y;
      placed.push(p);
    }

    // Render: label only (corner brackets removed 2026-04-18 per design
    // decision — just the pill glued to the bird).
    for (var i = 0; i < placed.length; i++) {
      var p = placed[i];
      var cxClamped = Math.max(LABEL_W_ESTIMATE / 2 + 8, Math.min(canvas.width - LABEL_W_ESTIMATE / 2 - 8, p.cx));
      if (p.species) {
        var conf = p.confidence != null ? ' ' + Math.round(p.confidence * 100) + '%' : '';
        var lock = p.isLocked ? ' \u2713' : ' \u2026';
        drawLabel(cxClamped, p.labelY, p.species + conf + lock, p.opacity);
      } else {
        drawDot(cxClamped, p.labelY, p.opacity);
      }
    }

    // Tiny stats overlay (top-right).
    if (lastRenderTrackCount > 0) {
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.font = '11px monospace';
      ctx.fillStyle = '#4ade80';
      ctx.textAlign = 'right';
      ctx.fillText('tracks: ' + lastRenderTrackCount, canvas.width - 8, 14);
      ctx.restore();
    }

    video.requestVideoFrameCallback(renderFrame);
  }

  // Start the render loop once the video has data
  video.addEventListener('loadeddata', function() {
    if (video.requestVideoFrameCallback) {
      video.requestVideoFrameCallback(renderFrame);
    }
  });

  // ── Controls ──

  window.toggleLabels = function() {
    showLabels = !showLabels;
    document.getElementById('btn-labels').classList.toggle('active', showLabels);
    if (!showLabels) ctx.clearRect(0, 0, canvas.width, canvas.height);
  };

  window.toggleFullscreen = function() {
    var wrap = document.getElementById('live-wrap');
    if (document.fullscreenElement) document.exitFullscreen();
    else wrap.requestFullscreen().catch(function() {});
  };

  // Debug overlay (D key)
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'd' || e.key === 'D') {
      debugVisible = !debugVisible;
      debugEl.style.display = debugVisible ? 'block' : 'none';
    }
  });

  setInterval(function() {
    if (!debugVisible) return;
    var lines = [];
    var wall = displayedFrameWallMs();
    var delay = wall != null ? ((Date.now() - wall) / 1000).toFixed(1) : '?';
    lines.push('Delay (sidecar): <b>' + delay + 's</b> behind live');
    lines.push('Resolution: ' + (video.videoWidth || '?') + 'x' + (video.videoHeight || '?'));
    lines.push('hls.latency: ' + (hls.latency ? hls.latency.toFixed(1) + 's' : '?'));
    lines.push('Events buffered: ' + eventBuffer.length);
    lines.push('Visible tracks (last render): ' + lastRenderTrackCount);
    lines.push('SSE: ' + (sseConnected ? '<span style="color:#4ade80">connected</span>' : '<span style="color:#f87171">disconnected</span>'));
    lines.push('Manifest age: ' + (manifestLastUpdateMs ? ((Date.now() - manifestLastUpdateMs) + 'ms') : 'not loaded'));
    lines.push('Segments known: ' + Object.keys(segmentWallclock).length);
    var frag = currentFragment();
    lines.push('Current frag: ' + (frag ? (frag.filename + ' +' + (video.currentTime - frag.fragStart).toFixed(2) + 's') : '?'));

    // KEY DIAGNOSTICS: where's the 1-second lag actually coming from?
    // If newest_event_age_behind_frame is large positive: events arrive ahead of frames shown → box would lead (we'd fix by matching later events)
    // If negative: events arrive stale compared to what's on screen → box lags behind bird
    if (wall != null && eventBuffer.length > 0) {
      var newest = eventBuffer[eventBuffer.length - 1];
      var matched = findEvent(wall);
      lines.push('<b style="color:#fbbf24">Event vs Frame deltas:</b>');
      lines.push('  newest event wall_time: ' + new Date(newest.wall_time_ms).toISOString().slice(11,23));
      lines.push('  frame wall_time:        ' + new Date(wall).toISOString().slice(11,23));
      lines.push('  newest - frame: <b>' + (newest.wall_time_ms - wall).toFixed(0) + 'ms</b>  (+ = event is ahead of frame)');
      if (matched) {
        lines.push('  matched event delta: <b>' + (matched.wall_time_ms - wall).toFixed(0) + 'ms</b>');
        lines.push('  matched tracks: ' + (matched.tracks ? matched.tracks.length : 0) + (matched.tracks && matched.tracks[0] && matched.tracks[0].species ? ' [' + matched.tracks[0].species + ']' : ''));
      } else {
        lines.push('  matched event: <i>none within tolerance</i>');
      }
      lines.push('  newest event age (vs now): ' + (Date.now() - newest.wall_time_ms) + 'ms');
    }

    if (video.buffered.length > 0) {
      var ahead = (video.buffered.end(video.buffered.length - 1) - video.currentTime).toFixed(1);
      lines.push('Buffer ahead: ' + ahead + 's');
    }
    debugEl.innerHTML = lines.join('<br>');
  }, 500);

})();
</script>
</body>
</html>
