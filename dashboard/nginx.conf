# Cookie-based auth: check for valid birdauth token
map $cookie_birdauth $auth_ok {
  "pW3nRj5vKz"  1;
  "aK7mL2pN8w"  1;
  default        0;
}

server {
  listen 80;
  server_name _;
  absolute_redirect off;

  # ── Public: login page + health check (no auth) ──
  location = /login {
    root /usr/share/nginx/html;
    try_files /login.html =404;
  }

  location /healthz {
    return 200 'ok';
  }

  # ── Everything below requires valid cookie ──

  location = / {
    if ($auth_ok = 0) { return 302 /login; }
    root /usr/share/nginx/html;
    try_files /index.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
  }

  # go2rtc streaming page and static JS assets
  location ~ ^/(stream\.html|video-rtc\.js|video-stream\.js) {
    if ($auth_ok = 0) { return 302 /login; }
    proxy_pass http://go2rtc:1984;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /api/ {
    if ($auth_ok = 0) { return 302 /login; }
    proxy_pass http://go2rtc:1984/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    proxy_read_timeout 86400;
  }

  location /hls/ {
    if ($auth_ok = 0) { return 302 /login; }
    proxy_pass http://go2rtc:1984/hls/;
    proxy_http_version 1.1;
    proxy_buffering off;
    add_header Cache-Control "no-cache";
  }

  # Bird classifier API (proxied from iMac)
  location /bird-api/ {
    if ($auth_ok = 0) { return 302 /login; }
    proxy_pass http://192.168.4.200:8099/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 30;
  }

  # BirdNET audio detection data (static JSON)
  location /birdnet-data/ {
    if ($auth_ok = 0) { return 302 /login; }
    alias /data/birdnet/;
    add_header Cache-Control "max-age=60";
    add_header Access-Control-Allow-Origin *;
  }

  # Real-time BirdNET SSE events (proxied from host)
  location /birdnet-sse/ {
    if ($auth_ok = 0) { return 302 /login; }
    proxy_pass http://172.22.0.1:8098/;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400;
    chunked_transfer_encoding off;
  }

  # BirdNET audio clips (proxied from host)
  location /birdnet-clips/ {
    if ($auth_ok = 0) { return 302 /login; }
    proxy_pass http://172.22.0.1:8098/clips/;
    proxy_http_version 1.1;
    proxy_read_timeout 30;
  }
}
