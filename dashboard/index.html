<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vives Bird Observatory</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0f1114;
    --bg-secondary: #1a1d23;
    --bg-card: #22262e;
    --bg-hover: #2a2f38;
    --border: #333840;
    --text-primary: #e8eaed;
    --text-secondary: #9aa0a8;
    --text-muted: #6b7280;
    --accent-green: #4ade80;
    --accent-green-dim: #16a34a;
    --accent-orange: #fb923c;
    --accent-red: #f87171;
    --accent-blue: #60a5fa;
    --accent-amber: #fbbf24;
    --accent-teal: #2dd4bf;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Top Bar */
  .topbar {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar-title {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .topbar-title span { font-size: 1.4rem; margin-right: 6px; }

  .topbar-stats {
    display: flex;
    gap: 20px;
    font-size: 0.85rem;
    color: var(--text-secondary);
    flex-wrap: wrap;
  }

  .topbar-stat b { color: var(--accent-green); font-weight: 600; }

  .tab-nav {
    display: flex;
    gap: 4px;
    background: var(--bg-primary);
    border-radius: var(--radius-sm);
    padding: 3px;
  }

  .tab-btn {
    padding: 7px 18px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }

  .tab-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
  .tab-btn.active { background: var(--accent-green-dim); color: #fff; }

  /* Main content area */
  .main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Row 1: Live + Recent */
  .row-live {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .panel-header {
    padding: 14px 18px;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-header .icon { font-size: 1.05rem; }

  .live-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #000;
  }

  .live-wrapper video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    background: #000;
  }

  .live-offline {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--text-muted);
    text-align: center;
    font-size: 0.9rem;
  }

  .live-offline .big { font-size: 2.5rem; display: block; margin-bottom: 8px; }

  /* Recent sightings list */
  .recent-list {
    max-height: 480px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .recent-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: default;
  }

  .recent-item:hover { background: var(--bg-hover); }
  .recent-item:last-child { border-bottom: none; }

  .recent-thumb {
    width: 48px; height: 48px;
    border-radius: 8px;
    background: var(--bg-primary);
    object-fit: cover;
    flex-shrink: 0;
  }

  .recent-info { flex: 1; min-width: 0; }
  .recent-species { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recent-meta { font-size: 0.78rem; color: var(--text-muted); }

  .confidence-badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .conf-high { background: rgba(74,222,128,0.15); color: var(--accent-green); }
  .conf-med { background: rgba(251,191,36,0.15); color: var(--accent-amber); }
  .conf-low { background: rgba(248,113,113,0.15); color: var(--accent-red); }

  /* Row 2: Chart */
  .row-chart { margin-bottom: 24px; }
  .chart-container { padding: 16px; }
  .chart-canvas-wrap { position: relative; min-height: 300px; }

  /* Row 3: Species Grid */
  .species-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .species-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }

  .species-card:hover { transform: translateY(-2px); border-color: var(--accent-green-dim); }

  .species-card-thumb {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    background: var(--bg-primary);
    display: block;
  }

  .species-card-body { padding: 14px 16px; }
  .species-card-name { font-weight: 700; font-size: 1rem; margin-bottom: 2px; }
  .species-card-sci { font-style: italic; color: var(--text-muted); font-size: 0.82rem; margin-bottom: 8px; }

  .species-card-stats {
    display: flex;
    gap: 16px;
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  .species-card-stats b { color: var(--text-primary); }

  .species-card-expand {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }

  .species-card.expanded .species-card-expand { display: block; padding-top: 12px; }

  .expand-det {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    font-size: 0.8rem;
    color: var(--text-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .expand-det:last-child { border-bottom: none; }

  .expand-det-thumb {
    width: 36px; height: 36px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--bg-primary);
  }

  /* ========== REVIEW TAB ========== */
  .review-container {
    max-width: 900px;
    margin: 0 auto;
  }

  .review-progress-bar {
    background: var(--bg-card);
    border-radius: 20px;
    overflow: hidden;
    height: 28px;
    margin-bottom: 20px;
    position: relative;
    border: 1px solid var(--border);
  }

  .review-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-green-dim), var(--accent-teal));
    transition: width 0.5s ease;
    border-radius: 20px;
  }

  .review-progress-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.8rem;
    font-weight: 600;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }

  .review-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .review-image-wrap {
    position: relative;
    width: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
  }

  .review-image-wrap img {
    max-width: 100%;
    max-height: 560px;
    display: block;
  }

  .review-body { padding: 20px 24px; }

  .review-prediction {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .review-sci { font-style: italic; color: var(--text-muted); font-size: 0.95rem; margin-bottom: 16px; }

  .review-top3 {
    margin-bottom: 20px;
  }

  .review-top3-title {
    font-size: 0.82rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .review-top3-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    font-size: 0.9rem;
  }

  .review-top3-rank {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .review-top3-item:first-child .review-top3-rank { background: var(--accent-green-dim); color: #fff; }

  .review-top3-score {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .review-conf {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }

  .review-conf-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .review-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .review-btn {
    padding: 12px 28px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .review-btn:active { transform: scale(0.97); }

  .btn-correct { background: var(--accent-green-dim); color: #fff; }
  .btn-correct:hover { background: #1db954; }
  .btn-wrong { background: #b91c1c; color: #fff; }
  .btn-wrong:hover { background: #dc2626; }
  .btn-skip { background: var(--bg-hover); color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-skip:hover { background: var(--border); color: var(--text-primary); }
  .btn-trash { background: #4b5563; color: #d1d5db; }
  .btn-trash:hover { background: #6b7280; color: #fff; }

  .review-wrong-dropdown {
    display: none;
    margin-top: 16px;
    padding: 16px;
    background: var(--bg-primary);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }

  .review-wrong-dropdown.visible { display: block; }

  .review-wrong-dropdown label {
    display: block;
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .review-wrong-dropdown select {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 6px;
    font-size: 0.9rem;
    margin-bottom: 12px;
    appearance: none;
    cursor: pointer;
  }

  .review-wrong-dropdown select:focus { outline: none; border-color: var(--accent-blue); }

  .review-wrong-search {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 6px;
    font-size: 0.9rem;
    margin-bottom: 8px;
  }

  .review-wrong-search:focus { outline: none; border-color: var(--accent-blue); }

  .btn-submit-wrong {
    padding: 10px 24px;
    background: var(--accent-orange);
    color: #000;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.88rem;
    cursor: pointer;
  }

  .btn-submit-wrong:hover { background: #f59e0b; }

  /* Review placeholder states */
  .review-empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .review-empty .big { font-size: 3rem; display: block; margin-bottom: 12px; }

  /* Loading and error states */
  .loading-msg {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .error-msg {
    text-align: center;
    padding: 20px;
    color: var(--accent-red);
    font-size: 0.85rem;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 0.88rem;
    font-weight: 500;
    z-index: 1000;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .toast.visible { transform: translateY(0); opacity: 1; }
  .toast-success { background: var(--accent-green-dim); color: #fff; }
  .toast-error { background: #b91c1c; color: #fff; }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Responsive */
  @media (max-width: 1024px) {
    .row-live { grid-template-columns: 1fr; }
    .recent-list { max-height: 300px; }
    .species-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  }

  @media (max-width: 640px) {
    .topbar { padding: 10px 14px; }
    .topbar-title { font-size: 1.1rem; }
    .topbar-stats { gap: 10px; font-size: 0.78rem; }
    .main { padding: 14px; }
    .species-grid { grid-template-columns: 1fr; }
    .review-actions { flex-direction: column; }
    .review-btn { justify-content: center; }
    .tab-btn { padding: 7px 12px; font-size: 0.82rem; }
    .lightbox-body { padding: 12px; }
    .lightbox-img { max-height: 60vh; }
  }

  /* ── Lightbox / Image Popup ── */
  .lightbox-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .lightbox-overlay.visible { display: flex; }

  .lightbox {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-width: 1100px;
    width: 100%;
    max-height: 92vh;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
  }

  .lightbox-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .lightbox-title {
    font-weight: 700;
    font-size: 1.1rem;
  }

  .lightbox-sci {
    font-style: italic;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-left: 10px;
  }

  .lightbox-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.6rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    line-height: 1;
  }

  .lightbox-close:hover { color: var(--text-primary); background: var(--bg-hover); }

  .lightbox-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    flex-shrink: 0;
  }

  .lightbox-tab {
    padding: 10px 20px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }

  .lightbox-tab:hover { color: var(--text-primary); }
  .lightbox-tab.active { color: var(--accent-green); border-bottom-color: var(--accent-green); }

  .lightbox-body {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: #000;
    min-height: 300px;
  }

  .lightbox-img {
    max-width: 100%;
    max-height: 75vh;
    display: block;
    border-radius: 4px;
  }

  .lightbox-footer {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
    font-size: 0.82rem;
    color: var(--text-secondary);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .lightbox-footer b { color: var(--text-primary); }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title"><span>&#x1F426;</span> Vives Bird Observatory</div>
    <div class="topbar-stats" id="topbar-stats">
      <span>Loading stats...</span>
    </div>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="review">Review</button>
  </div>
</div>

<!-- Main Content -->
<div class="main">

  <!-- Dashboard Tab -->
  <div class="tab-content active" id="tab-dashboard">

    <!-- Row 1: Live + Recent -->
    <div class="row-live">
      <div class="panel">
        <div class="panel-header"><span class="icon">&#x1F3A5;</span> Live Camera Feed</div>
        <div class="live-wrapper">
          <video id="live-video" autoplay muted playsinline></video>
          <div class="live-offline" id="live-offline">
            <span class="big">&#x1F4F7;</span>
            <div>Connecting to camera...</div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><span class="icon">&#x1F424;</span> Recent Sightings</div>
        <div class="recent-list" id="recent-list">
          <div class="loading-msg">Loading recent sightings...</div>
        </div>
      </div>
    </div>

    <!-- Row 2: Chart -->
    <div class="row-chart">
      <div class="panel">
        <div class="panel-header"><span class="icon">&#x1F4CA;</span> Species Detection Counts</div>
        <div class="chart-container">
          <div class="chart-canvas-wrap">
            <canvas id="speciesChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Row 3: Species Grid -->
    <div id="species-grid" class="species-grid">
      <div class="loading-msg" style="grid-column: 1/-1;">Loading species data...</div>
    </div>

  </div>

  <!-- Review Tab -->
  <div class="tab-content" id="tab-review">
    <div class="review-container">
      <div class="review-progress-bar" id="review-progress-bar">
        <div class="review-progress-fill" id="review-progress-fill" style="width: 0%"></div>
        <div class="review-progress-text" id="review-progress-text">Loading...</div>
      </div>
      <div id="review-area">
        <div class="loading-msg">Loading review queue...</div>
      </div>
    </div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox-overlay" onclick="if(event.target===this)closeLightbox()">
  <div class="lightbox">
    <div class="lightbox-header">
      <div>
        <span class="lightbox-title" id="lightbox-title"></span>
        <span class="lightbox-sci" id="lightbox-sci"></span>
      </div>
      <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    </div>
    <div class="lightbox-tabs">
      <button class="lightbox-tab active" data-lbtab="photo" onclick="switchLightboxTab('photo')">Photo</button>
      <button class="lightbox-tab" data-lbtab="annotated" onclick="switchLightboxTab('annotated')">Annotated</button>
    </div>
    <div class="lightbox-body">
      <img class="lightbox-img" id="lightbox-img" alt="Bird photo">
    </div>
    <div class="lightbox-footer" id="lightbox-footer"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // ── State ──
  let speciesChart = null;
  let visualSpecies = [];
  let audioSpecies = [];
  let recentDetections = [];
  let pendingReview = [];
  let reviewIndex = 0;
  let reviewStats = { total_classified: 0, total_reviewed: 0, remaining: 0 };
  let regionalSpecies = [];

  // ── Helpers ──
  function parseTimestamp(ts) {
    if (!ts) return NaN;
    // Fix dashed time: "2026-03-02 11-10-42" → "2026-03-02T11:10:42"
    var m = ts.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{2})-(\d{2})-(\d{2})$/);
    if (m) return new Date(m[1] + 'T' + m[2] + ':' + m[3] + ':' + m[4]).getTime();
    return new Date(ts).getTime();
  }

  function tsHour(ts) {
    if (!ts) return 12;
    var m = ts.match(/(\d{2})[-:](\d{2})[-:](\d{2})$/);
    return m ? parseInt(m[1], 10) : 12;
  }

  function timeAgo(ts) {
    if (!ts) return '';
    const now = Date.now();
    const t = parseTimestamp(ts);
    if (isNaN(t)) return '';
    const diff = Math.max(0, Math.floor((now - t) / 1000));
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
    return new Date(t).toLocaleDateString();
  }

  function confClass(val) {
    if (val >= 0.7) return 'conf-high';
    if (val >= 0.4) return 'conf-med';
    return 'conf-low';
  }

  function confLabel(val) {
    return (val * 100).toFixed(0) + '%';
  }

  function confColor(val) {
    if (val >= 0.7) return 'var(--accent-green)';
    if (val >= 0.4) return 'var(--accent-amber)';
    return 'var(--accent-red)';
  }

  async function apiFetch(url) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.json();
  }

  // ── Live Feed: MSE over WebSocket (go2rtc) ──
  function initLiveFeed() {
    const video = document.getElementById('live-video');
    const offline = document.getElementById('live-offline');
    if (!video) return;

    let ws, mediaSource, sourceBuffer, queue = [];

    function cleanup() {
      if (ws) { try { ws.close(); } catch(e) {} ws = null; }
      if (mediaSource && mediaSource.readyState === 'open') {
        try { mediaSource.endOfStream(); } catch(e) {}
      }
      mediaSource = null;
      sourceBuffer = null;
      queue = [];
    }

    function flushQueue() {
      if (!sourceBuffer || sourceBuffer.updating || queue.length === 0) return;
      // Trim buffer to keep latency low
      try {
        if (video.buffered.length > 0) {
          var end = video.buffered.end(video.buffered.length - 1);
          var start = video.buffered.start(0);
          if (end - start > 8) {
            sourceBuffer.remove(start, end - 4);
            return;
          }
          // Jump to live edge if playback falls behind
          if (video.currentTime < end - 3) {
            video.currentTime = end - 0.5;
          }
        }
      } catch(e) {}
      try {
        sourceBuffer.appendBuffer(queue.shift());
      } catch(e) {
        queue = [];
      }
    }

    function connect() {
      cleanup();
      if (offline) offline.style.display = '';

      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/api/ws?src=feeder-main');
      ws.binaryType = 'arraybuffer';

      ws.onopen = function() {
        if (offline) offline.style.display = 'none';
        mediaSource = new MediaSource();
        video.src = URL.createObjectURL(mediaSource);
        mediaSource.addEventListener('sourceopen', function() {
          // MediaSource ready — request MSE stream from go2rtc
          ws.send(JSON.stringify({type: 'mse'}));
        });
      };

      ws.onmessage = function(event) {
        if (typeof event.data === 'string') {
          try {
            var msg = JSON.parse(event.data);
            if (msg.type === 'mse' && mediaSource.readyState === 'open') {
              sourceBuffer = mediaSource.addSourceBuffer(msg.value);
              sourceBuffer.mode = 'segments';
              sourceBuffer.addEventListener('updateend', flushQueue);
              video.play().catch(function(){});
            }
          } catch(e) {}
        } else if (sourceBuffer) {
          if (sourceBuffer.updating || queue.length > 0) {
            queue.push(event.data);
          } else {
            try {
              sourceBuffer.appendBuffer(event.data);
            } catch(e) {
              queue = [];
            }
          }
        }
      };

      ws.onclose = function() {
        if (offline) offline.style.display = '';
        setTimeout(connect, 3000);
      };

      ws.onerror = function() { ws.close(); };
    }

    connect();
  }

  // ── Lightbox ──
  let lightboxFile = '';
  let lightboxTab = 'photo';
  let _lbReg = []; // registry for lightbox items (avoids inline escaping issues)

  function regLB(file, name, sci, conf, ts) {
    _lbReg.push({file: file, name: name, sci: sci, conf: conf, ts: ts});
    return _lbReg.length - 1;
  }

  window.openLB = function(idx) {
    var item = _lbReg[idx];
    if (item) openLightbox(item.file, item.name, item.sci, item.conf, item.ts);
  };

  window.openLightbox = function(file, name, sci, conf, ts) {
    lightboxFile = file;
    lightboxTab = 'photo';
    document.getElementById('lightbox-title').textContent = name || 'Unknown';
    document.getElementById('lightbox-sci').textContent = sci || '';
    // Set photo tab active
    document.querySelectorAll('.lightbox-tab').forEach(t => t.classList.toggle('active', t.dataset.lbtab === 'photo'));
    // Load raw image
    var img = document.getElementById('lightbox-img');
    img.src = '/bird-api/image-raw/' + encodeURIComponent(file);
    img.onerror = function() { img.src = '/bird-api/image/' + encodeURIComponent(file); };
    // Footer metadata
    var footer = document.getElementById('lightbox-footer');
    var parts = [];
    if (conf) parts.push('<span>Detection: <b>' + (conf * 100).toFixed(0) + '%</b></span>');
    if (ts) parts.push('<span>' + timeAgo(ts) + '</span>');
    parts.push('<span>' + escHtml(file) + '</span>');
    footer.innerHTML = parts.join('');
    document.getElementById('lightbox-overlay').classList.add('visible');
  };

  window.switchLightboxTab = function(tab) {
    lightboxTab = tab;
    document.querySelectorAll('.lightbox-tab').forEach(t => t.classList.toggle('active', t.dataset.lbtab === tab));
    var img = document.getElementById('lightbox-img');
    if (tab === 'photo') {
      img.src = '/bird-api/image-raw/' + encodeURIComponent(lightboxFile);
      img.onerror = function() { img.src = '/bird-api/image/' + encodeURIComponent(lightboxFile); };
    } else {
      img.onerror = null;
      img.src = '/bird-api/image/' + encodeURIComponent(lightboxFile);
    }
  };

  window.closeLightbox = function() {
    document.getElementById('lightbox-overlay').classList.remove('visible');
    document.getElementById('lightbox-img').src = '';
  };

  window.openDetection = function(idx) {
    var d = recentDetections[idx];
    if (!d || !d.file) return;
    var name = d.top_prediction ? d.top_prediction.common_name : 'Unknown';
    var sci = d.top_prediction ? d.top_prediction.scientific_name : '';
    var conf = d.best_detection ? d.best_detection.confidence : 0;
    var ts = d.source_timestamp || d.timestamp;
    openLightbox(d.file, name, sci, conf, ts);
  };

  // Close on Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
  });

  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast toast-' + type + ' visible';
    setTimeout(() => el.classList.remove('visible'), 3000);
  }

  // ── Tab navigation ──
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'review') loadReviewData();
    });
  });

  // ── Dashboard: Stats ──
  async function loadStats() {
    try {
      const data = await apiFetch('/bird-api/stats');
      const el = document.getElementById('topbar-stats');
      const updated = data.last_updated ? timeAgo(data.last_updated) : 'never';
      el.innerHTML =
        '<span><b>' + (data.species_count || 0) + '</b> species detected</span>' +
        '<span><b>' + (data.classified || 0) + '</b> birds classified</span>' +
        '<span>Updated: ' + updated + '</span>';
    } catch (e) {
      document.getElementById('topbar-stats').innerHTML = '<span style="color:var(--accent-red)">Stats unavailable</span>';
    }
  }

  // ── Dashboard: Recent Sightings ──
  async function loadRecent() {
    try {
      recentDetections = await apiFetch('/bird-api/recent?limit=10');
      renderRecent();
    } catch (e) {
      document.getElementById('recent-list').innerHTML = '<div class="error-msg">Could not load recent sightings</div>';
    }
  }

  function renderRecent() {
    const el = document.getElementById('recent-list');
    if (!recentDetections.length) {
      el.innerHTML = '<div class="loading-msg">No recent detections</div>';
      return;
    }
    el.innerHTML = recentDetections.slice(0, 10).map((d, i) => {
      const name = d.top_prediction ? d.top_prediction.common_name : 'Unknown';
      const conf = d.best_detection ? d.best_detection.confidence : (d.top_prediction ? d.top_prediction.raw_score : 0);
      const ts = d.source_timestamp || d.timestamp;
      const thumbUrl = d.file ? '/bird-api/image/' + encodeURIComponent(d.file) : '';
      return '<div class="recent-item" style="cursor:pointer" onclick="openDetection(' + i + ')">' +
        (thumbUrl ? '<img class="recent-thumb" src="' + thumbUrl + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '<div class="recent-thumb"></div>') +
        '<div class="recent-info">' +
          '<div class="recent-species">' + escHtml(name) + '</div>' +
          '<div class="recent-meta">' + timeAgo(ts) + '</div>' +
        '</div>' +
        '<span class="confidence-badge ' + confClass(conf) + '">' + confLabel(conf) + '</span>' +
      '</div>';
    }).join('');
  }

  // ── Dashboard: Species chart ──
  async function loadSpeciesData() {
    try {
      visualSpecies = await apiFetch('/bird-api/species');
    } catch (e) {
      visualSpecies = [];
    }
    try {
      const audio = await apiFetch('/birdnet-data/summary.json');
      audioSpecies = audio.species || [];
    } catch (e) {
      audioSpecies = [];
    }
    renderChart();
    renderSpeciesGrid();
  }

  function renderChart() {
    // Merge visual and audio species
    const merged = {};
    visualSpecies.forEach(s => {
      const key = s.common_name.toLowerCase();
      if (!merged[key]) merged[key] = { name: s.common_name, visual: 0, audio: 0 };
      merged[key].visual = s.count || 0;
    });
    audioSpecies.forEach(s => {
      const key = s.common_name.toLowerCase();
      if (!merged[key]) merged[key] = { name: s.common_name, visual: 0, audio: 0 };
      merged[key].audio = s.count || 0;
    });

    const sorted = Object.values(merged).sort((a, b) => (b.visual + b.audio) - (a.visual + a.audio)).slice(0, 25);

    const labels = sorted.map(s => {
      let lbl = s.name;
      const parts = [];
      if (s.visual > 0) parts.push(s.visual + ' \uD83D\uDCF7');
      if (s.audio > 0) parts.push(s.audio + ' \uD83C\uDF99\uFE0F');
      if (parts.length) lbl += ' (' + parts.join(' ') + ')';
      return lbl;
    });

    const palette = [
      '#4ade80','#fbbf24','#fb923c','#60a5fa','#2dd4bf',
      '#a78bfa','#f87171','#34d399','#f472b6','#818cf8',
      '#16a34a','#d97706','#ea580c','#2563eb','#0d9488',
      '#7c3aed','#dc2626','#059669','#db2777','#4f46e5',
      '#15803d','#b45309','#c2410c','#1d4ed8','#0f766e'
    ];

    const ctx = document.getElementById('speciesChart').getContext('2d');

    if (speciesChart) speciesChart.destroy();

    const hasAudio = sorted.some(s => s.audio > 0);

    const datasets = [{
      label: 'Camera',
      data: sorted.map(s => s.visual),
      backgroundColor: sorted.map((_, i) => palette[i % palette.length] + 'cc'),
      borderColor: sorted.map((_, i) => palette[i % palette.length]),
      borderWidth: 1,
      borderRadius: 4,
      barPercentage: hasAudio ? 0.5 : 0.7,
      categoryPercentage: 0.85
    }];

    if (hasAudio) {
      datasets.push({
        label: 'Audio (BirdNET)',
        data: sorted.map(s => s.audio),
        backgroundColor: sorted.map((_, i) => palette[i % palette.length] + '55'),
        borderColor: sorted.map((_, i) => palette[i % palette.length] + '88'),
        borderWidth: 1,
        borderRadius: 4,
        barPercentage: 0.5,
        categoryPercentage: 0.85
      });
    }

    speciesChart = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: hasAudio,
            labels: { color: '#9aa0a8', font: { size: 12 } }
          },
          tooltip: {
            backgroundColor: '#22262e',
            titleColor: '#e8eaed',
            bodyColor: '#9aa0a8',
            borderColor: '#333840',
            borderWidth: 1,
            cornerRadius: 8
          }
        },
        scales: {
          x: {
            grid: { color: '#333840', drawBorder: false },
            ticks: { color: '#6b7280', font: { size: 11 } }
          },
          y: {
            grid: { display: false },
            ticks: { color: '#e8eaed', font: { size: 12 } }
          }
        }
      }
    });

    // Adjust canvas height based on number of species
    const wrapEl = document.querySelector('.chart-canvas-wrap');
    wrapEl.style.minHeight = Math.max(300, sorted.length * 32) + 'px';
  }

  // ── Dashboard: Species Grid ──
  async function loadAllRecent() {
    try {
      const all = await apiFetch('/bird-api/recent?limit=50');
      recentDetections = all;
      return all;
    } catch (e) {
      return [];
    }
  }

  function renderSpeciesGrid() {
    const grid = document.getElementById('species-grid');
    if (!visualSpecies.length) {
      grid.innerHTML = '<div class="loading-msg" style="grid-column:1/-1;">No species data available</div>';
      return;
    }

    const sorted = [...visualSpecies].sort((a, b) => (b.count || 0) - (a.count || 0));

    _lbReg = []; // Reset lightbox registry for fresh render

    // Build a map of species to their recent detections for thumbnails
    const speciesDetections = {};
    recentDetections.forEach(d => {
      if (d.top_prediction) {
        const key = d.top_prediction.common_name;
        if (!speciesDetections[key]) speciesDetections[key] = [];
        speciesDetections[key].push(d);
      }
    });

    grid.innerHTML = sorted.map(sp => {
      const dets = speciesDetections[sp.common_name] || [];
      // Prefer daytime thumbnail (hour 7-17) to avoid black nighttime images
      const daytimeDets = dets.filter(d => { var h = tsHour(d.source_timestamp); return h >= 7 && h < 18; });
      const thumbDet = daytimeDets.length > 0 ? daytimeDets[0] : (dets.length > 0 ? dets[0] : null);
      const thumbFile = thumbDet ? thumbDet.file : null;
      const thumbUrl = thumbFile ? '/bird-api/image/' + encodeURIComponent(thumbFile) : '';
      const lastSeen = sp.last_seen ? timeAgo(sp.last_seen) : 'unknown';

      const expandHtml = dets.slice(0, 5).map(d => {
        const c = d.best_detection ? d.best_detection.confidence : 0;
        const ts = d.source_timestamp || d.timestamp;
        const ef = encodeURIComponent(d.file);
        const lbi = regLB(d.file, sp.common_name, sp.scientific_name || '', c, ts);
        return '<div class="expand-det" style="cursor:pointer" onclick="event.stopPropagation();openLB(' + lbi + ')">' +
          '<img class="expand-det-thumb" src="/bird-api/image/' + ef + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' +
          '<span>' + timeAgo(ts) + '</span>' +
          '<span class="confidence-badge ' + confClass(c) + '">' + confLabel(c) + '</span>' +
        '</div>';
      }).join('');

      const thumbLbi = thumbFile ? regLB(thumbFile, sp.common_name, sp.scientific_name || '', 0, '') : -1;

      return '<div class="species-card" onclick="this.classList.toggle(\'expanded\')">' +
        (thumbUrl
          ? '<img class="species-card-thumb" src="' + thumbUrl + '" alt="" loading="lazy" onerror="this.style.display=\'none\'"' + (thumbLbi >= 0 ? ' onclick="event.stopPropagation();openLB(' + thumbLbi + ')" style="cursor:zoom-in"' : '') + '>'
          : '<div class="species-card-thumb" style="background:var(--bg-primary);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:2rem;">&#x1F426;</div>'
        ) +
        '<div class="species-card-body">' +
          '<div class="species-card-name">' + escHtml(sp.common_name) + '</div>' +
          '<div class="species-card-sci">' + escHtml(sp.scientific_name || '') + '</div>' +
          '<div class="species-card-stats">' +
            '<span><b>' + (sp.count || 0) + '</b> sightings</span>' +
            '<span>Last: ' + lastSeen + '</span>' +
          '</div>' +
        '</div>' +
        (expandHtml ? '<div class="species-card-expand">' + expandHtml + '</div>' : '') +
      '</div>';
    }).join('');
  }

  // ── Review Tab ──
  async function loadReviewData() {
    const area = document.getElementById('review-area');
    area.innerHTML = '<div class="loading-msg">Loading review queue...</div>';

    try {
      const data = await apiFetch('/bird-api/review/pending');
      pendingReview = data.pending || [];
      reviewStats.total_classified = data.total_classified || 0;
      reviewStats.total_reviewed = data.total_reviewed || 0;
      reviewStats.remaining = data.remaining || 0;
      reviewIndex = 0;
    } catch (e) {
      area.innerHTML = '<div class="error-msg">Could not load review queue</div>';
      return;
    }

    try {
      regionalSpecies = await apiFetch('/bird-api/regional-species');
    } catch (e) {
      regionalSpecies = [];
    }

    updateReviewProgress();
    renderReviewItem();
  }

  function updateReviewProgress() {
    const total = reviewStats.total_reviewed + reviewStats.remaining;
    const reviewed = reviewStats.total_reviewed;
    const pct = total > 0 ? Math.round((reviewed / total) * 100) : 0;
    document.getElementById('review-progress-fill').style.width = pct + '%';
    document.getElementById('review-progress-text').textContent = reviewed + ' / ' + total + ' reviewed';
  }

  function renderReviewItem() {
    const area = document.getElementById('review-area');

    if (reviewIndex >= pendingReview.length) {
      area.innerHTML = '<div class="review-empty">' +
        '<span class="big">&#x2705;</span>' +
        '<div style="font-size:1.2rem;font-weight:600;margin-bottom:8px;">All caught up!</div>' +
        '<div style="color:var(--text-muted)">No more items to review right now.</div>' +
      '</div>';
      return;
    }

    const item = pendingReview[reviewIndex];
    const pred = item.top_prediction || {};
    const conf = item.best_detection ? item.best_detection.confidence : 0;
    const top3 = item.top3 || [];
    const imgUrl = item.file ? '/bird-api/image/' + encodeURIComponent(item.file) : '';

    let top3Html = top3.map((t, i) => {
      return '<div class="review-top3-item">' +
        '<span class="review-top3-rank">' + (i + 1) + '</span>' +
        '<span>' + escHtml(t.common_name || '') + '</span>' +
        '<span class="review-top3-score">' + (t.raw_score != null ? (t.raw_score * 100).toFixed(1) + '%' : '') + '</span>' +
      '</div>';
    }).join('');

    area.innerHTML = '<div class="review-card">' +
      '<div class="review-image-wrap">' +
        (imgUrl ? '<img src="' + imgUrl + '" alt="Detection image" loading="lazy">' : '<div style="color:var(--text-muted)">No image available</div>') +
      '</div>' +
      '<div class="review-body">' +
        '<div class="review-prediction">' + escHtml(pred.common_name || 'Unknown') + '</div>' +
        '<div class="review-sci">' + escHtml(pred.scientific_name || '') + '</div>' +
        '<div class="review-conf">' +
          '<span class="review-conf-dot" style="background:' + confColor(conf) + '"></span>' +
          'Detection confidence: ' + confLabel(conf) +
        '</div>' +
        (top3Html ? '<div class="review-top3"><div class="review-top3-title">Top 3 Predictions</div>' + top3Html + '</div>' : '') +
        '<div class="review-actions">' +
          '<button class="review-btn btn-correct" onclick="submitReview(\'correct\')">&#x2713; Correct</button>' +
          '<button class="review-btn btn-wrong" onclick="toggleWrongDropdown()">&#x2717; Wrong</button>' +
          '<button class="review-btn btn-trash" onclick="submitReview(\'trash\')">&#x1F5D1; Trash</button>' +
          '<button class="review-btn btn-skip" onclick="submitReview(\'skip\')">&#x2192; Skip</button>' +
        '</div>' +
        '<div class="review-wrong-dropdown" id="wrong-dropdown">' +
          '<label for="wrong-search">Select the correct species:</label>' +
          '<input type="text" class="review-wrong-search" id="wrong-search" placeholder="Type to filter species..." oninput="filterSpeciesDropdown()">' +
          '<select id="wrong-species" size="6">' +
            buildSpeciesOptions() +
          '</select>' +
          '<button class="btn-submit-wrong" onclick="submitWrongCorrection()">Submit Correction</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function buildSpeciesOptions() {
    return regionalSpecies.map(s =>
      '<option value="' + escAttr(s) + '">' + escHtml(s) + '</option>'
    ).join('');
  }

  window.filterSpeciesDropdown = function() {
    const query = document.getElementById('wrong-search').value.toLowerCase();
    const sel = document.getElementById('wrong-species');
    sel.innerHTML = regionalSpecies
      .filter(s => s.toLowerCase().includes(query))
      .map(s => '<option value="' + escAttr(s) + '">' + escHtml(s) + '</option>')
      .join('');
  };

  window.toggleWrongDropdown = function() {
    const dd = document.getElementById('wrong-dropdown');
    dd.classList.toggle('visible');
  };

  window.submitReview = async function(verdict) {
    if (reviewIndex >= pendingReview.length) return;
    const item = pendingReview[reviewIndex];
    try {
      await fetch('/bird-api/review/' + encodeURIComponent(item.file) + '?verdict=' + verdict, { method: 'POST' });
      reviewStats.total_reviewed++;
      reviewStats.remaining = Math.max(0, reviewStats.remaining - 1);
      updateReviewProgress();
      reviewIndex++;
      renderReviewItem();
      showToast(verdict === 'correct' ? 'Marked correct' : verdict === 'skip' ? 'Skipped' : verdict === 'trash' ? 'Moved to trash' : 'Submitted', 'success');
    } catch (e) {
      showToast('Failed to submit review', 'error');
    }
  };

  window.submitWrongCorrection = async function() {
    const sel = document.getElementById('wrong-species');
    const species = sel.value;
    if (!species) {
      showToast('Please select the correct species', 'error');
      return;
    }
    if (reviewIndex >= pendingReview.length) return;
    const item = pendingReview[reviewIndex];
    try {
      await fetch('/bird-api/review/' + encodeURIComponent(item.file) + '?verdict=wrong&correct_species=' + encodeURIComponent(species), { method: 'POST' });
      reviewStats.total_reviewed++;
      reviewStats.remaining = Math.max(0, reviewStats.remaining - 1);
      updateReviewProgress();
      reviewIndex++;
      renderReviewItem();
      showToast('Correction submitted: ' + species, 'success');
    } catch (e) {
      showToast('Failed to submit correction', 'error');
    }
  };

  // ── HTML escaping ──
  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function escAttr(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── Init & Refresh ──
  async function init() {
    initLiveFeed();
    await Promise.all([loadStats(), loadAllRecent()]);
    renderRecent();
    await loadSpeciesData();
  }

  async function refresh() {
    await Promise.all([loadStats(), loadAllRecent()]);
    renderRecent();
    await loadSpeciesData();
  }

  init();
  setInterval(refresh, 60000);
})();
